				<details id="homebrew">
					<summary class="cursor-pointer list-none">
						<h2>Using Homebrew Without Admin Privileges</h2>
					</summary>
					<p>2024-10-07</p>
					<p>By default, installing and updating Homebrew packages doesn’t work when run as a normal, non-admin user. This is what I do to fix that. Run this as admin, but replace <code>leaf</code> with your normal user’s name.</p>
					<pre>sudo chown -R leaf /opt/homebrew/</pre>
					<p>Put the following in your normal user's <code>~/.zshrc</code> file.</p>
					<pre>
export PATH="/opt/homebrew/bin:$PATH"
export PATH="/opt/homebrew/sbin:$PATH"
export HOMEBREW_CASK_OPTS="--appdir=~/Applications"</pre
					>
					<p>Just the first two lines are enough to install formulae. If you want Homebrew to handle casks, include the third line to tell Homebrew to install to the normal user's ~/Applications/ instead of /Applications/.</p>
				</details>
				<details id="macos-tiling">
					<summary class="cursor-pointer list-none">
						<h2>Fixing macOS Window Tiling Keyboard Shortcuts</h2>
					</summary>
					<p>2024-09-27</p>
					<p>Keyboard shortcuts for macOS window tiling use the Apple's globe key and control, so they don't work with third party keyboards. In System Settings -> Keyboard -> Keyboard Shortcuts you can set caps lock to globe and solve the issue, but if you want to use just caps lock without control, keep reading.</p>
					<p>In the same menu, go to the App Shortcuts tab. Click the +, pick a shortcut, and enter the name of a tiling action (all of them can be found in the menu bar -> Window -> Move & Resize).</p>
					<p>
						Setting all these by hand can be a pain, so I figured out how to automate everything from the terminal. The command below uses the keycodes cmd(@) + opt(~) + ctrl(^) + arrows(obscure unicode) for tiling to halves, adding shift($) for quarter tiling. Those modifiers probably sound like terrible hand gymnastics, but I just map all three keys to caps lock using
						<a href="https://hyperkey.app/">Hyperkey</a> or <a href="https://karabiner-elements.pqrs.org/">Karabiner-Elements</a>.
					</p>
					<pre>
defaults write -g "NSUserKeyEquivalents" '{
    Fill = "@~^f";
    Left = "@~^\U0090";
    Right = "@~^\U0092";
    Top = "@~^\U0091";
    Bottom = "@~^\U0093";
    "Bottom Left" = "@~^$\U2190";
    "Top Left" = "@~^$\U2191";
    "Top Right" = "@~^$\U2192";
    "Bottom Right" = "@~^$\U2193";
    "Return to Previous Size" = "@~^r";
}'</pre
					>
				</details>
