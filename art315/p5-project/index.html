<!doctype html>
<html lang="en">
	<head>
		<title>Leaf Eriksen</title>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="thumbnail" content="/assets/leaf.jpg" />
		<link href="/dist.css" rel="stylesheet" />
		<!-- Tailwind-based background on sketch-holder; no separate stylesheet -->
		<script src="/assets/app.js" defer></script>
		<script src="https://cdn.jsdelivr.net/npm/p5@2.2.2/lib/p5.js"></script>
		<script src="/art315/p5-project/sketch.js" defer></script>
		<script src="/art315/p5-project/bootstrap.js" defer></script>
		<script src="/art315/p5-project/view-watcher.js" defer></script>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Vibur&display=swap" rel="stylesheet" />
	</head>
	<body class="max-w-none bg-light-bg font-serif text-xl text-light-tx dark:bg-dark-bg dark:text-dark-tx prose-a:text-light-pu prose-a:dark:text-dark-pu">
		<div class="container mx-auto px-10 py-10 sm:pt-20 lg:w-4/5">
			<header class="prose-xl">
				<h1 class="font-neon text-dark-neon">Leaf’s P5 Project</h1>
				<nav id="main-nav" class="flex flex-wrap gap-5 prose-a:text-light-ma! prose-a:dark:text-dark-ma!">
					<a href="/art315/p5-project/" data-path="view" aria-current="page" class="aria-[current=page]:text-inherit!">View</a>
					<a href="/art315/p5-project/?p=about" data-path="about" class="aria-[current=page]:text-inherit!">About</a>
					<a href="/">Back to Home</a>
				</nav>
			</header>

			<main id="app" class="mt-10">
				<!-- Content injected from templates via app.js -->
				<div class="prose-xl">
					<p>To see this site, you need a browser version published no earlier than 2026.</p>
					<p>This site uses the navigation API for routing between pages, so if you still can’t see the content, please enable Javascript.</p>
				</div>
			</main>
		</div>

		<template id="view">
			<main id="view-main">
				<!-- Sketch container will host the p5 canvas when this view is active -->
				<div id="sketch-holder" class="aspect-3/2 max-h-lvh bg-[url('/art315/p5-project/assets/mt-rainier-tunnel.png')] bg-cover"></div>
			</main>
			<div class="prose">
				<p><a href="https://commons.wikimedia.org/wiki/File:Mount_Rainier_National_Park_-_East_Side_Tunnel_from_the_north_03.jpg">reference photo</a> by Joe Mabel under GNU Free Documentation License</p>
			</div>
		</template>

		<template id="about">
			<div class="prose-xl w-full sm:w-2/3">
				<p>This project is inspired by the poetry-based artwork of Robert Montgomery. His work focuses on presenting simple, thought-provoking poems in a visually various visually engaging mediums.</p>
				<p><a href="https://madisongalleries.com/artworks/5536-robert-montgomery-trees-will-riot-mexico-2022/">TREES WILL RIOT</a> was made as part of a fundraising and awareness campaign for <a href="http://greenpeace.org">Greenpeace</a> and their mission.</p>
				<p>My work here aims to take inspiration from his unique style of engaging artistry while adding my own style design and motion to the concept. I intend for this work to be fair use, as it was made for educational purposes, and is not for profit or commercial use.</p>
			</div>
		</template>
	</body>
</html>
